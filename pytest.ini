[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options (add `--cov-report=html` on the CLI for an HTML report under ./htmlcov)
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=validation
    --cov=data_processor
    --cov=combination_tones
    --cov=densidade_intervalar
    --cov=spectral_analysis
    --cov=xml_loader
    --cov=utils.notes
    --cov-report=term-missing
    --cov-fail-under=63

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    requires_gui: Tests that require GUI
    requires_audio: Tests that require audio files

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

