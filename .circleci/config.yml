version: 2.1

jobs:
  tests:
    parameters:
      python-version:
        type: string

    docker:
      - image: cimg/python:<< parameters.python-version >>

    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-textural-density-pip-<< parameters.python-version >>-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}
            - v1-textural-density-pip-<< parameters.python-version >>-{{ checksum "pyproject.toml" }}
            - v1-textural-density-pip-<< parameters.python-version >>-

      - run:
          name: Install system packages for headless GUI tests
          command: |
            sudo apt-get update
            sudo apt-get install -y xvfb

      - run:
          name: Upgrade packaging tools
          command: |
            python -m pip install --upgrade pip setuptools wheel

      - run:
          name: Install dependencies
          command: |
            if [ -f requirements.txt ]; then
              python -m pip install -r requirements.txt
            fi
            python -m pip install -e ".[dev]"

      - save_cache:
          key: v1-textural-density-pip-<< parameters.python-version >>-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

      - run:
          name: Repository safety check
          command: |
            test -f pyproject.toml
            test -f README.md
            test -d tests
            test -d core
            test -d validation
            test -d instrumentos
            test ! -f proc_audio.py
            test ! -f compile_metrics.py
            test ! -f density.py
            grep -q "Textural Density" README.md
            legacy_hits=$(
              grep -r --include='*.md' --include='*.py' --include='*.toml' --include='*.yml' --include='*.yaml' \
                -E 'Simultaneity Density|Densidade Vertical|\<SDA\>' . --exclude-dir=.git 2>/dev/null \
                | grep -v 'tools/rename_docs_branding.py' || true
            )
            if [ -n "$legacy_hits" ]; then
              echo "Legacy product names found outside tools/rename_docs_branding.py:"
              echo "$legacy_hits"
              exit 1
            fi
            echo "Repository safety check passed."

      - run:
          name: Run tests with coverage
          command: |
            mkdir -p test-results
            xvfb-run -a python -m pytest tests -q \
              --cov=. \
              --cov-report=term-missing \
              --cov-report=xml \
              --junitxml=test-results/pytest.xml

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: coverage.xml
          destination: coverage.xml

workflows:
  validate:
    jobs:
      - tests:
          matrix:
            parameters:
              python-version:
                - "3.10"
                - "3.11"
